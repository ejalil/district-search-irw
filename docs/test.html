<script type="application/shiny-prerendered" data-context="server">
library(sf)
library(httr)
library(jsonlite)
library(htmltools)
library(leaflet)
library(shiny)

CONGRESSIONAL_PATH   <- "~/Documents/GitHub/district-search-irw/docs/Maine_Voting_Districts_2021_US_Congress.geojson"
STATE_HOUSE_PATH     <- "~/Documents/GitHub/district-search-irw/docs/Maine_Voting_Districts_2021_House.geojson"
STATE_SENATE_PATH    <- "~/Documents/GitHub/district-search-irw/docs/Maine_Voting_Districts_2021_State_Senate.geojson"
CONGRESSIONAL_COLUMN <- "DISTRICT"
STATE_HOUSE_COLUMN   <- "DISTRICT"
STATE_SENATE_COLUMN  <- "DISTRICT"

congressional <- reactive({
  st_read(path.expand(CONGRESSIONAL_PATH), quiet = TRUE) |> st_transform(4326)
})

state_house <- reactive({
  st_read(path.expand(STATE_HOUSE_PATH), quiet = TRUE) |> st_transform(4326)
})

state_senate <- reactive({
  st_read(path.expand(STATE_SENATE_PATH), quiet = TRUE) |> st_transform(4326)
})

geocode_address <- function(address) {
  if (!grepl("maine|,\\s*me\\b", address, ignore.case = TRUE)) {
    address <- paste0(address, ", Maine")
  }
  url <- httr::modify_url(
    "https://nominatim.openstreetmap.org/search",
    query = list(q = address, format = "json", limit = 1, countrycodes = "us")
  )
  resp <- tryCatch(
    httr::GET(url, httr::user_agent("MaineDistrictLookup/1.0"), httr::timeout(10)),
    error = function(e) NULL
  )
  if (is.null(resp) || httr::http_error(resp)) return(NULL)
  result <- jsonlite::fromJSON(httr::content(resp, "text", encoding = "UTF-8"))
  if (length(result) == 0 || nrow(result) == 0) return(NULL)
  list(
    lat          = as.numeric(result$lat[1]),
    lon          = as.numeric(result$lon[1]),
    display_name = result$display_name[1]
  )
}

find_district <- function(point, layer, col) {
  idx <- sf::st_within(point, layer, sparse = FALSE)
  hit <- which(idx[1, ])
  if (length(hit) == 0) return(NA_character_)
  val <- layer[[col]][hit[1]]
  if (length(val) == 0 || is.null(val)) return(NA_character_)
  as.character(val)
}

lookup_result <- eventReactive(input$lookup, {
  req(nchar(trimws(input$address)) > 0)
  geo <- geocode_address(trimws(input$address))
  if (is.null(geo)) return(list(status = "not_found", address = input$address))

  point           <- sf::st_sfc(sf::st_point(c(geo$lon, geo$lat)), crs = 4326)
  cong_district   <- find_district(point, congressional(), CONGRESSIONAL_COLUMN)
  house_district  <- find_district(point, state_house(),   STATE_HOUSE_COLUMN)
  senate_district <- find_district(point, state_senate(),  STATE_SENATE_COLUMN)

  list(
    status        = "found",
    address       = geo$display_name,
    lat           = geo$lat,
    lon           = geo$lon,
    congressional = cong_district,
    state_house   = house_district,
    state_senate  = senate_district,
    cong_sf       = congressional(),
    house_sf      = state_house(),
    sen_sf        = state_senate()
  )
})

output$result_box <- renderUI({
  res <- lookup_result()

  badge <- function(label, value) {
    color <- if (is.na(value)) "#95a5a6" else "#27ae60"
    text  <- if (is.na(value)) "Not found in this layer" else paste("District", value)
    tags$div(
      style = paste0("border-left:6px solid ", color, ";background:", color,
                     "18;padding:12px 18px;border-radius:6px;margin-bottom:10px;"),
      tags$strong(style = paste0("color:", color, ";"), label),
      tags$span(style = "margin-left:10px;font-size:1rem;", text)
    )
  }

  if (res$status == "not_found") {
    return(tags$div(
      style = "border-left:6px solid #c0392b;background:#c0392b18;padding:16px 20px;border-radius:6px;",
      tags$h4(style = "color:#c0392b;margin-top:0;", "Address not found"),
      tags$p(style = "margin:0;",
             paste0('"', res$address, '" could not be geocoded. Try adding the city or zip code.'))
    ))
  }

  tagList(
    tags$div(
      style = "background:#f8f9fa;padding:10px 16px;border-radius:6px;margin-bottom:12px;font-size:0.9rem;color:#555;",
      tags$b("Address: "), res$address
    ),
    badge("U.S. Congressional District", res$congressional),
    badge("Maine State House District",  res$state_house),
    badge("Maine State Senate District", res$state_senate)
  )
})

output$map <- renderLeaflet({
  res <- lookup_result()
  req(res$status == "found")

  cong_sf  <- res$cong_sf
  house_sf <- res$house_sf
  sen_sf   <- res$sen_sf

  pal_cong   <- colorFactor(palette = "Blues",   domain = cong_sf[[CONGRESSIONAL_COLUMN]])
  pal_house  <- colorFactor(palette = "Oranges", domain = house_sf[[STATE_HOUSE_COLUMN]])
  pal_senate <- colorFactor(palette = "Purples", domain = sen_sf[[STATE_SENATE_COLUMN]])

  leaflet() |>
    addProviderTiles(providers$CartoDB.Positron) |>
    addPolygons(
      data             = cong_sf,
      group            = "Congressional Districts",
      fillColor        = ~pal_cong(get(CONGRESSIONAL_COLUMN)),
      fillOpacity      = 0.35, color = "#2471a3", weight = 2,
      label            = ~paste("Congressional District", get(CONGRESSIONAL_COLUMN)),
      highlightOptions = highlightOptions(weight = 4, fillOpacity = 0.6, bringToFront = TRUE)
    ) |>
    addPolygons(
      data             = house_sf,
      group            = "State House Districts",
      fillColor        = ~pal_house(get(STATE_HOUSE_COLUMN)),
      fillOpacity      = 0.35, color = "#a04000", weight = 2,
      label            = ~paste("State House District", get(STATE_HOUSE_COLUMN)),
      highlightOptions = highlightOptions(weight = 4, fillOpacity = 0.6, bringToFront = TRUE)
    ) |>
    addPolygons(
      data             = sen_sf,
      group            = "State Senate Districts",
      fillColor        = ~pal_senate(get(STATE_SENATE_COLUMN)),
      fillOpacity      = 0.35, color = "#6c3483", weight = 2,
      label            = ~paste("State Senate District", get(STATE_SENATE_COLUMN)),
      highlightOptions = highlightOptions(weight = 4, fillOpacity = 0.6, bringToFront = TRUE)
    ) |>
    addMarkers(
      lng   = res$lon, lat = res$lat,
      popup = paste0(
        "<b>", htmlEscape(res$address), "<\u002fb>",
        "<br>Congressional: ", ifelse(is.na(res$congressional), "N/A", res$congressional),
        "<br>State House: ",   ifelse(is.na(res$state_house),   "N/A", res$state_house),
        "<br>State Senate: ",  ifelse(is.na(res$state_senate),  "N/A", res$state_senate)
      )
    ) |>
    addLayersControl(
      overlayGroups = c("Congressional Districts", "State House Districts", "State Senate Districts"),
      options       = layersControlOptions(collapsed = FALSE)
    ) |>
    setView(lng = res$lon, lat = res$lat, zoom = 10)
})
</script>
 
<script type="application/shiny-prerendered" data-context="server-extras">
ojs_define <- function(..., .session = shiny::getDefaultReactiveDomain()) {
  quos <- rlang::enquos(...)
  vars <- rlang::list2(...)
  nm <- names(vars)
  if (is.null(nm)) {
    nm <- rep_len("", length(vars))
  }
  mapply(function(q, nm, val) {
    # Infer name, if possible
    if (nm == "") {
      tryCatch({
        nm <- rlang::as_name(q)
      }, error = function(e) {
        code <- paste(collapse = "\n", deparse(rlang::f_rhs(q)))
        stop("ojs_define() could not create a name for the argument: ", code)
      })
    }
    .session$output[[nm]] <- val
    outputOptions(.session$output, nm, suspendWhenHidden = FALSE)
    .session$sendCustomMessage("ojs-export", list(name = nm))
    NULL
  }, quos, nm, vars, SIMPLIFY = FALSE, USE.NAMES = FALSE)
  invisible()
}
</script>

    const stripColumnClz = (el) => {

      if (el.children) {
        for (const child of el.children) {

    if (id === null || id.startsWith('sec-')) {
      // Special case sections, only their first couple elements
      const container = document.createElement("div");
      if (note.children && note.children.length > 2) {
        container.appendChild(note.children[0].cloneNode(true));
        for (let i = 1; i < note.children.length; i++) {
          const child = note.children[i];
          if (child.tagName === "P" && child.innerText === "") {
            continue;
          } else {
            container.appendChild(child.cloneNode(true));
            break;
          }
        }
        if (window.Quarto?.typesetMath) {
          window.Quarto.typesetMath(container);
        }
        return container.innerHTML
      } else {
        if (window.Quarto?.typesetMath) {
          window.Quarto.typesetMath(note);
        }
        return note.innerHTML;

    } else {

      const anchorLink = note.querySelector('a.anchorjs-link');
      if (anchorLink) {

      if (window.Quarto?.typesetMath) {

            const html = processXRef(null, note);
            instance.setContent(html);

        }).finally(() => {
          instance.enable();
          instance.show();
        });
      }
    }, function(instance) {
    });

    function throttle(fn, ms) {
    let throttle = false;
    let timer;
      return (...args) => {
        if(!throttle) { // first call gets through
            fn.apply(this, args);
            throttle = true;
        } else { // all the others get throttled
            if(timer) clearTimeout(timer); // cancel #2
            timer = setTimeout(() => {
              fn.apply(this, args);
              timer = throttle = false;
            }, ms);
        }
      };
    }
      // Attach click handler to the DT
